version: "3.8"

services:

  api:
    build: .
    container_name: ai_law_api
    command: uvicorn api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
      - ./chat.db:/app/chat.db
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  streamlit:
    build: .
    container_name: ai_law_streamlit
    command: streamlit run app.py --server.port 8501 --server.address 0.0.0.0 --server.headless true
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./storage:/app/storage
      - ./data:/app/data
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
